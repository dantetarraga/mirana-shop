services:
  postgres:
    image: postgres:16-alpine
    container_name: mirana_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mirana
      POSTGRES_PASSWORD: mirana_dev
      POSTGRES_DB: mirana_shop
    ports:
      - "5432:5432"
    volumes:
      - mirana_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mirana -d mirana_shop"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mirana_postgres_data:
